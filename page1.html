<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Review Survey</title>
    <style>
        @font-face {
            font-family: 'GrandHotel';
            src: url('./GrandHotel-Regular.ttf') format('truetype');
        }
        :root {
            --text-primary: #4a3b32;
            --text-secondary: #7a6a5e;
            --star-empty: #ffe3e8;
            --star-filled: #ff4d73;
            --btn-text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'GrandHotel', -apple-system-rounded, "SF Pro Rounded", system-ui, sans-serif;
            background: linear-gradient(135deg, #fffbf5 0%, #ffeef2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .survey-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.15);
        }
        h1 {
            font-size: 46px;
            font-weight: 400;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.1;
        }
        .question-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .question-title {
            font-size: 22px;
            font-weight: 400;
            color: var(--text-secondary);
        }
        .stars-container {
            display: flex;
            gap: 4px;
        }
        .star {
            font-size: 26px;
            cursor: pointer;
            color: var(--star-empty);
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
            transition: color 0.15s ease, transform 0.15s ease;
            transform-origin: center;
        }
        .star:focus { outline: none; }
        .star.filled {
            color: var(--star-filled);
            transform: scale(1.15);
            text-shadow: 0 0 8px rgba(255, 77, 115, 0.6);
        }
        .btn-next {
            width: 100%;
            background: linear-gradient(135deg, #f08a78 0%, #ff96a7 100%);
            color: var(--btn-text);
            font-family: inherit;
            font-size: 20px;
            font-weight: 500;
            padding: 12px;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 14px rgba(240, 138, 120, 0.4);
        }
        
        @keyframes hoverBounce {
            0%, 100% { transform: translateY(-2px); }
            50% { transform: translateY(-6px); }
        }
        
        .btn-next:hover:not(:disabled) {
            animation: hoverBounce 1s ease-in-out infinite;
            box-shadow: 0 6px 18px rgba(240, 138, 120, 0.55);
        }
        .btn-next:active:not(:disabled) {
            animation: none;
            transform: scale(0.98);
        }
        .btn-next:disabled {
            background: #ebdcd4;
            color: #7c6e65;
            opacity: 0.5;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="survey-container">
        <h1>The Post-Date Accountability Report</h1>

        <div class="question-block">
            <span class="question-title">The Venue Selection (Rate the ambiance)</span>
            <div class="stars-container" data-metric="venue">
                <button type="button" class="star" data-value="1">★</button>
                <button type="button" class="star" data-value="2">★</button>
                <button type="button" class="star" data-value="3">★</button>
                <button type="button" class="star" data-value="4">★</button>
                <button type="button" class="star" data-value="5">★</button>
            </div>
        </div>

        <div class="question-block">
            <span class="question-title">Sri's Absolute Mastery of Uno 👑</span>
            <div class="stars-container" data-metric="sriUno">
                <button type="button" class="star" data-value="1">★</button>
                <button type="button" class="star" data-value="2">★</button>
                <button type="button" class="star" data-value="3">★</button>
                <button type="button" class="star" data-value="4">★</button>
                <button type="button" class="star" data-value="5">★</button>
            </div>
        </div>

        <div class="question-block">
            <span class="question-title">Yashika's Uno 'Strategy' (Losing 3 out of 4 games 📉)</span>
            <div class="stars-container" data-metric="yashikaUno">
                <button type="button" class="star" data-value="1">★</button>
                <button type="button" class="star" data-value="2">★</button>
                <button type="button" class="star" data-value="3">★</button>
                <button type="button" class="star" data-value="4">★</button>
                <button type="button" class="star" data-value="5">★</button>
            </div>
        </div>

        <div class="question-block">
            <span class="question-title">Frequency of Panicked Silences 🤐</span>
            <div class="stars-container" data-metric="panickedSilences">
                <button type="button" class="star" data-value="1">★</button>
                <button type="button" class="star" data-value="2">★</button>
                <button type="button" class="star" data-value="3">★</button>
                <button type="button" class="star" data-value="4">★</button>
                <button type="button" class="star" data-value="5">★</button>
            </div>
        </div>

        <div class="question-block">
            <span class="question-title">Overall Vibe (Be honest, but not too honest)</span>
            <div class="stars-container" data-metric="overallVibe">
                <button type="button" class="star" data-value="1">★</button>
                <button type="button" class="star" data-value="2">★</button>
                <button type="button" class="star" data-value="3">★</button>
                <button type="button" class="star" data-value="4">★</button>
                <button type="button" class="star" data-value="5">★</button>
            </div>
        </div>

        <button type="button" class="btn-next" id="btn-next" disabled>Next</button>
    </div>

    <script>
        const starContainers = document.querySelectorAll('.stars-container');
        const btnNext = document.getElementById('btn-next');

        const ratings = {
            venue: 0,
            sriUno: 0,
            yashikaUno: 0,
            panickedSilences: 0,
            overallVibe: 0
        };

        function checkRatingsComplete() {
            const allRated = Object.values(ratings).every(r => r > 0);
            btnNext.disabled = !allRated;
        }

        starContainers.forEach(container => {
            const metric = container.getAttribute('data-metric');
            const stars = container.querySelectorAll('.star');

            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const rating = parseInt(star.getAttribute('data-value'));
                    ratings[metric] = rating;

                    stars.forEach(s => {
                        const val = parseInt(s.getAttribute('data-value'));
                        s.classList.toggle('filled', val <= rating);
                    });

                    checkRatingsComplete();
                });
            });
        });

        // Configure your Formspree Form ID here to receive responses by email
        // Register at https://formspree.io/ and create a form to get an ID.
        const FORMSPREE_FORM_ID = ''; 

        btnNext.addEventListener('click', () => {
            // Save locally in the browser
            localStorage.setItem('date_survey_ratings', JSON.stringify(ratings));

            if (FORMSPREE_FORM_ID) {
                btnNext.disabled = true;
                btnNext.textContent = 'Saving...';
                
                fetch(`https://formspree.io/f/${FORMSPREE_FORM_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(ratings)
                })
                .then(() => {
                    window.location.href = 'invite.html';
                })
                .catch(err => {
                    console.error('Submission failed:', err);
                    window.location.href = 'invite.html';
                });
            } else {
                window.location.href = 'invite.html';
            }
        });
    </script>
</body>
</html>
