<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on another date?</title>
    <style>
        @font-face {
            font-family: 'GrandHotel';
            src: url('./GrandHotel-Regular.ttf') format('truetype');
        }
        :root {
            --text-primary: #4a3b32;
            --text-secondary: #7a6a5e;
            --btn-yes-bg: linear-gradient(135deg, #f08a78 0%, #ff96a7 100%);
            --btn-yes-text: #ffffff;
            --btn-no-bg: rgba(255, 255, 255, 0.55);
            --btn-no-text: #4a3b32;
            --btn-hover-opacity: 0.9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'GrandHotel', -apple-system-rounded, "SF Pro Rounded", system-ui, sans-serif;
            background: linear-gradient(135deg, #fffbf5 0%, #ffeef2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.15);
        }
        h1 {
            font-size: 46px;
            font-weight: 400;
            line-height: 1.2;
        }
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            position: relative;
            margin-top: 12px;
        }
        .btn {
            font-family: inherit;
            font-size: 20px;
            font-weight: 500;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        #btn-yes {
            background: var(--btn-yes-bg);
            color: var(--btn-yes-text);
            box-shadow: 0 4px 14px rgba(240, 138, 120, 0.4);
            transform-origin: center;
        }
        #btn-no {
            background: var(--btn-no-bg);
            color: var(--btn-no-text);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transform-origin: center;
        }
        #btn-yes:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 18px rgba(240, 138, 120, 0.55);
        }
        #btn-no:hover {
            background-color: rgba(255, 255, 255, 0.8);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .heart {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            display: inline-block;
            font-size: 16px;
        }
        .heart.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Will you go on another date with Sri?</h1>
        <div class="button-group">
            <button type="button" class="btn" id="btn-yes">Yes <span class="heart" id="yes-heart">❤️</span></button>
            <button type="button" class="btn" id="btn-no" tabindex="-1">No</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const header = document.querySelector('h1');
        const buttonGroup = document.querySelector('.button-group');

        let origCenter = null;
        let yesScale = 1.0;

        function getOrigCenter() {
            if (!origCenter) {
                const prevTransform = btnNo.style.transform;
                btnNo.style.transform = 'none';
                const rect = btnNo.getBoundingClientRect();
                origCenter = {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
                btnNo.style.transform = prevTransform;
            }
            return origCenter;
        }

        function triggerDodge(cursorX, cursorY) {
            const center = getOrigCenter();
            const rangeX = Math.min(window.innerWidth / 2.5, 300);
            const rangeY = Math.min(window.innerHeight / 2.5, 300);

            let randomX = 0, randomY = 0;
            for (let i = 0; i < 50; i++) {
                randomX = (Math.random() - 0.5) * 2 * rangeX;
                randomY = (Math.random() - 0.5) * 2 * rangeY;
                if (Math.hypot(center.x + randomX - cursorX, center.y + randomY - cursorY) > 200) break;
            }

            btnNo.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.6)`;
            
            // ponytail: cap yesScale at 4.0 (maximum size) and fade in the heart
            if (yesScale < 4.0) {
                yesScale += 1.5;
                btnYes.style.transform = `scale(${yesScale})`;
            }
            if (yesScale >= 4.0) {
                const heart = document.getElementById('yes-heart');
                if (heart) {
                    heart.classList.add('show');
                }
            }
        }

        document.addEventListener('mousemove', (e) => {
            if (buttonGroup.style.opacity === '0') return;
            const rect = btnNo.getBoundingClientRect();
            if (!rect.width || !rect.left) return;
            if (Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2)) < 80) {
                triggerDodge(e.clientX, e.clientY);
            }
        });

        window.addEventListener('resize', () => { origCenter = null; });

        btnNo.addEventListener('click', (e) => { e.preventDefault(); triggerDodge(e.clientX, e.clientY); });
        btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); triggerDodge(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

        btnYes.addEventListener('click', () => {
            buttonGroup.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            buttonGroup.style.opacity = '0';
            buttonGroup.style.transform = 'scale(0.8)';
            setTimeout(() => { buttonGroup.style.display = 'none'; }, 400);

            header.style.transition = 'opacity 0.3s ease';
            header.style.opacity = '0';
            setTimeout(() => {
                header.textContent = "Sri would love to plan the next one with you ...Sri will contact you soon!! Stay tuned..";
                header.style.opacity = '1';
            }, 300);
        });
    </script>
</body>
</html>
